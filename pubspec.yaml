name: timer
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+5

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4
  intl: ^0.19.0
  uuid: ^4.3.3
  audioplayers: ^6.5.1
  flutter_slidable: ^3.1.0
  permission_handler: ^11.3.0
  flutter_svg: ^2.0.10+1
  geolocator: ^10.1.0
  geocoding: ^2.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.8
  
flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/sounds/alarmbuzzer.mp3
    - assets/sounds/alert.mp3
    - assets/sounds/beautifuldream.mp3
    - assets/sounds/beep.mp3
    - assets/sounds/birdssinging.mp3
    - assets/sounds/casino.mp3
    - assets/sounds/catwalk.mp3
    - assets/sounds/cheers.mp3
    - assets/sounds/classic.mp3
    - assets/sounds/complicated.mp3
    - assets/sounds/crowdlaugh.mp3
    - assets/sounds/drivingambition.mp3
    - assets/sounds/gameover.mp3
    - assets/sounds/gameshow.mp3
    - assets/sounds/keyboardtyping.mp3
    - assets/sounds/latinlovers.mp3
    - assets/sounds/lightrain.mp3
    - assets/sounds/pianohorror.mp3
    - assets/sounds/retro.mp3
    - assets/sounds/romantic.mp3
    - assets/sounds/rooster.mp3
    - assets/sounds/silentdescent.mp3
    - assets/sounds/techhouse.mp3
    - assets/sounds/ticktock.mp3
    - assets/sounds/villapenthouse.mp3
    - assets/sounds/vintagephone.mp3
    - assets/sounds/woodspirits.mp3
    - assets/sounds/notification.mp3

flutter_launcher_icons:
  android: true
  image_path: "assets/icon.png"

flutter_native_splash:
  android: true
  color: "#FFFFFF"
  image: assets/icon.png

  android_12:
    color: "#FFFFFF"
    image: assets/splashicon.png

